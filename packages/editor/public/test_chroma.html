<!DOCTYPE html>
<html>
<head>
    <title>Chroma Key Test</title>
    <style>
        body { background: #333; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .comparison { display: flex; gap: 20px; }
        canvas, img { border: 2px solid #555; max-width: 400px; height: auto; }
        .label { text-align: center; margin-bottom: 10px; font-weight: bold; }
        .checkerboard { background-image: linear-gradient(45deg, #808080 25%, transparent 25%), linear-gradient(-45deg, #808080 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #808080 75%), linear-gradient(-45deg, transparent 75%, #808080 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
    </style>
</head>
<body>
    <h1>Canvas Chroma Key Test (HSV Engine)</h1>
    <div class="comparison">
        <div>
            <div class="label">Original (Green Screen)</div>
            <img id="source" src="/sad.png">
        </div>
        <div>
            <div class="label">Processed (Transparent WebP)</div>
            <canvas id="output" class="checkerboard"></canvas>
        </div>
    </div>

    <script>
        const img = document.getElementById('source');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');

        img.onload = () => {
            const w = img.naturalWidth || img.width;
            const h = img.naturalHeight || img.height;
            canvas.width = w;
            canvas.height = h;
            
            // Set CSS size to match for visual consistency in the test page
            canvas.style.width = getComputedStyle(img).width;
            canvas.style.height = getComputedStyle(img).height;

            ctx.drawImage(img, 0, 0, w, h);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Same HSV logic used in PropertyPanel.vue
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                const rN = r/255, gN = g/255, bN = b/255;
                const max = Math.max(rN, gN, bN), min = Math.min(rN, gN, bN);
                const d = max - min;
                let h = 0;
                const s = max === 0 ? 0 : d / max;
                const v = max;
                if (max !== min) {
                    if (max === rN) h = (gN - bN) / d + (gN < bN ? 6 : 0);
                    else if (max === gN) h = (bN - rN) / d + 2;
                    else if (max === bN) h = (rN - gN) / d + 4;
                    h /= 6;
                }
                const hue = h * 360;

                // Threshold: Green Hue (65-170)
                if (hue > 65 && hue < 170 && s > 0.25 && v > 0.25) {
                    data[i + 3] = 0;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            console.log("Chroma key processing complete.");
        };
    </script>
</body>
</html>
