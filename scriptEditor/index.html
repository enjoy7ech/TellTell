<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TellTell Script Editor</title>
    <link rel="stylesheet" href="./src/style.css" />
    <!-- LiteGraph CSS -->
    <link rel="stylesheet" type="text/css" href="/node_modules/litegraph.js/css/litegraph.css">
  </head>
  <body>
    <div id="app">
      <!-- Left Sidebar: Characters & Episodes -->
      <aside class="sidebar">
        <header class="sidebar-header">TellTell 叙事编辑器</header>
        
        <div class="secondary-header" style="display: flex; justify-content: space-between; align-items: center;">
            <span>项目资产目录</span>
            <div class="header-actions">
                <button id="new-folder-btn" title="新建文件夹" style="padding: 2px 8px; font-size: 0.7rem; background: #2980b9;">+ 文件夹</button>
            </div>
        </div>
        <div style="padding: 10px;">
            <button id="open-dir-btn" style="width: 100%; font-size: 0.85rem; background: var(--accent-color); border: none; font-weight: 500;">打开素材文件夹 (Assets)</button>
            <div id="dir-path" style="font-size: 0.7rem; opacity: 0.5; margin-top: 8px; word-break: break-all;">未选择任何文件夹</div>
        </div>

        <div class="secondary-header">剧情大纲 / 资产管理</div>
        <div class="char-list" id="char-list">
            <!-- 动态生成 -->
        </div>

        <div style="padding: 10px; margin-top: auto;">
            <div id="status" class="status-bar">就绪</div>
            <div class="header-actions" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
                <button id="save-btn" class="primary">保存项目</button>
                <button id="publish-btn" style="background: #e67e22;">发布 Bundle</button>
            </div>
            <button id="play-btn" style="width: 100%; margin-top: 8px; background: #27ae60;">运行预览</button>
        </div>
      </aside>

      <!-- Main Editor Container -->
      <main class="editor-container">
        <header class="toolbar">
          <button class="primary" id="save-btn">Save Current</button>
          <button id="publish-btn" style="background: #e67e22;">Publish Bundle</button>
          <div style="flex: 1;"></div>
          <span id="status" style="font-size: 0.8rem; opacity: 0.6;">Ready</span>
          <button id="play-btn" style="background: #27ae60;">Preview Game</button>
        </header>

        <!-- Canvas for DAG Flow -->
        <div class="canvas-wrapper">
            <canvas id="main-canvas"></canvas>
        </div>
      </main>

      <!-- Right Sidebar: Properties -->
      <aside class="property-panel hidden" id="prop-panel">
        <h3>Node Properties</h3>
        <div id="prop-content"></div>
      </aside>
    </div>

    <!-- Main Entry Script -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
