<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TellTell - 交互叙事新纪元</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./index.css" />
</head>

<body>

  <!-- Loading Overlay -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <p style="margin-top: 1rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); text-transform: uppercase;">
      Initializing Story Engine...</p>
  </div>

  <!-- Background Layer -->
  <div class="game-bg"></div>
  <div class="bg-overlay"></div>

  <!-- Menu Control Container -->
  <main class="menu-container">
    <header>
      <h1 class="game-title">TellTell</h1>
      <p class="game-subtitle">Interactive Story Driven Engine</p>
    </header>

    <ul class="menu-list">
      <li class="menu-item" id="btn-start">
        开始新篇章
        <span>New Narrative</span>
      </li>
      <li class="menu-item" id="btn-load">
        继续昨日故事
        <span>Load Memory</span>
      </li>
      <li class="menu-item" id="btn-settings">
        感知调优
        <span>Settings</span>
      </li>
      <li class="menu-item" id="btn-exit">
        离开模拟
        <span>Exit Term</span>
      </li>
    </ul>
  </main>

  <!-- In-Game UI Layer (Hidden by default) -->
  <div id="gameLayer" class="game-layer hidden">
    <div id="gameBackground" class="game-bg-layer"></div>

    <!-- Character Portait Overlay -->
    <div class="character-container">
      <img id="charPortrait" class="char-portrait" src="" alt="">
    </div>

    <!-- Dialogue System -->
    <div class="dialogue-system" id="dialogueBox">
      <div class="dialogue-box">
        <div class="dialogue-name" id="charName">...</div>
        <div class="dialogue-content" id="dialogueText">
          这是一个充满未知的起点。按下任意键或点击开始。
        </div>
        <div class="dialogue-next-arrow"></div>
      </div>

      <!-- Choices Overlay -->
      <div id="choiceContainer" class="choice-container hidden"></div>
    </div>
  </div>

  <footer class="version-info">
    VER 1.0.2 / BUILD 2026-04-02 / ENJOY7ECH.TELLTELL
  </footer>

  <!-- Scripts -->
  <script type="module" src="/main.ts"></script>
  <script>
    // Reveal main screen once loaded
    window.addEventListener('load', () => {
      const loader = document.getElementById('loadingScreen');
      setTimeout(() => {
        loader.classList.add('hidden');
      }, 800);
    });

    // Handle Menu Interactions
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', async (e) => {
        const action = e.currentTarget.id;
        if (action === 'btn-start') {
          // 1. Hide menu
          document.querySelector('.menu-container').style.display = 'none';
          document.querySelector('.game-bg').classList.add('hidden');
          document.querySelector('.bg-overlay').classList.add('hidden');

          // 2. Show game layer
          document.getElementById('gameLayer').classList.remove('hidden');

          // 3. Trigger engine
          if (window.game && window.game.engine) {
            // Ensure initial state
            await window.game.engine.playNext();
          }
        }
      });
    });

    // Handle Clicks into dialogue
    document.getElementById('dialogueBox').addEventListener('click', () => {
      if (window.game && window.game.engine) {
        window.game.engine.playNext();
      }
    });

  </script>
</body>

</html>
