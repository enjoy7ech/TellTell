<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TellTell Engine - Test Env</title>
    <style>
      body {
        background: #111;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .panel {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 12px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        max-width: 400px;
        text-align: center;
      }
      h1 { margin-top: 0; }
      p { opacity: 0.8; }
      kbd {
        background: rgba(255, 255, 255, 0.2);
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>TellTell Engine</h1>
      <p>引擎逻辑已初始化</p>
      <p>打开控制台并输入 <code>window.game</code> 进行调试</p>
      <hr>
      <p><small>Vite + TypeScript Test Environment</small></p>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
